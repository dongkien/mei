# ============================================================
# Kinh tế lượng dành cho bé Mei — Học liệu (giọng người bố)
# Quarto Website project · 10 buổi
# ============================================================

project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "lectures/*.qmd"
    - "stata-lab/*.qmd"
    - "r-lab/*.qmd"
    - "python-lab/*.qmd"
    - "problem-sets/*.qmd"
    - "exams/*.qmd"
  resources:
    - "data/"

execute:
  freeze: auto
  echo: true
  warning: false

execute-dir: project

website:
  title: "Kinh tế lượng dành cho bé Mei"
  description: "Kinh tế lượng kể bằng giọng người bố ấm áp — viết cho bé Mei. Đi từ trực giác, không làm con sợ."
  search:
    location: navbar
    type: overlay
    copy-button: true

  navbar:
    background: primary
    pinned: true
    left:
      - href: index.qmd
        text: "Trang chủ"
      - href: syllabus.qmd
        text: "Đề cương"
      - href: schedule.qmd
        text: "Lịch học"
      - href: lectures/index.qmd
        text: "Bài giảng"
      - text: "AcLab+"
        menu:
          - href: stata-lab/index.qmd
            text: "Stata Lab"
          - href: r-lab/index.qmd
            text: "R Lab"
          - href: python-lab/index.qmd
            text: "Python Lab"
      - href: problem-sets/index.qmd
        text: "Tiểu luận / Bài tập"
      - href: exams/index.qmd
        text: "Đánh giá"

  sidebar:
    - id: python-lab
      title: "Python Lab"
      style: docked
      align: left
      collapse-level: 2
      contents:
        - text: "← Trang chủ"
          href: index.qmd
        - python-lab/index.qmd
        - section: "Hướng dẫn"
          contents:
            - python-lab/lab-00.qmd
        - section: "Lab theo buổi"
          contents:
            - python-lab/lab-01.qmd
            - python-lab/lab-02.qmd
            - python-lab/lab-03.qmd
            - python-lab/lab-04.qmd
            - python-lab/lab-05.qmd
            - python-lab/lab-06.qmd
            - python-lab/lab-07.qmd
            - python-lab/lab-08.qmd
            - python-lab/lab-09.qmd
            - python-lab/lab-10.qmd
    - id: r-lab
      title: "R Lab"
      style: docked
      align: left
      collapse-level: 2
      contents:
        - text: "← Trang chủ"
          href: index.qmd
        - r-lab/index.qmd
        - section: "Hướng dẫn"
          contents:
            - r-lab/lab-00.qmd
        - section: "Lab theo buổi"
          contents:
            - r-lab/lab-01.qmd
            - r-lab/lab-02.qmd
            - r-lab/lab-03.qmd
            - r-lab/lab-04.qmd
            - r-lab/lab-05.qmd
            - r-lab/lab-06.qmd
            - r-lab/lab-07.qmd
            - r-lab/lab-08.qmd
            - r-lab/lab-09.qmd
            - r-lab/lab-10.qmd
    - id: stata-lab
      title: "Stata Lab"
      style: docked
      align: left
      collapse-level: 2
      contents:
        - text: "← Trang chủ"
          href: index.qmd
        - stata-lab/index.qmd
        - section: "Hướng dẫn"
          contents:
            - stata-lab/lab-00.qmd
        - section: "Lab theo buổi"
          contents:
            - stata-lab/lab-01.qmd
            - stata-lab/lab-02.qmd
            - stata-lab/lab-03.qmd
            - stata-lab/lab-04.qmd
            - stata-lab/lab-05.qmd
            - stata-lab/lab-06.qmd
            - stata-lab/lab-07.qmd
            - stata-lab/lab-08.qmd
            - stata-lab/lab-09.qmd
            - stata-lab/lab-10.qmd
    - id: bai-giang
      title: "Bài giảng"
      style: docked
      align: left
      collapse-level: 2
      contents:
        - text: "← Trang chủ"
          href: index.qmd
        - section: "Chương 1 — Bắt đầu hành trình"
          contents:
            - lectures/buoi-01.qmd
        - section: "Chương 2 — Học kẻ đường qua dữ liệu"
          contents:
            - lectures/buoi-02.qmd
            - lectures/buoi-03.qmd
            - lectures/buoi-04.qmd
        - section: "Chương 3 — Đọc hiểu & uốn nắn mô hình"
          contents:
            - lectures/buoi-05.qmd
            - lectures/buoi-06.qmd
            - lectures/buoi-07.qmd
        - section: "Chương 4 — Những cái bẫy phải tránh"
          contents:
            - lectures/buoi-08.qmd
            - lectures/buoi-09.qmd
        - section: "Chương 5 — Chân trời phía trước"
          contents:
            - lectures/buoi-10.qmd

  page-footer:
    border: true
    background: light
    left: |
      © 2026 · [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/deed.vi)
    center: "Bố viết tặng con — bé Mei ❤️"
    right: "Tạo bằng [Quarto](https://quarto.org/)"

format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
    css: styles/custom.css
    highlight-style: arrow
    toc: true
    toc-depth: 3
    toc-title: "Trong bài"
    toc-location: right
    number-sections: false
    code-fold: false
    code-tools: false
    code-link: false
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
    link-external-icon: true
    anchor-sections: true
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    footnotes-hover: true
    lang: vi
    mainfont: "Lora, Georgia, serif"
    monofont: "JetBrains Mono, ui-monospace, monospace"
    fontsize: "1.05rem"
    linestretch: 1.7
    grid:
      sidebar-width: 280px
      body-width: 800px
      margin-width: 220px

lang: vi
